{% extends "base.html" %}

{% block title %}Overview — Quant System{% endblock %}

{% block content %}
<section class="overview">
     <h1>Overview</h1>

     <section class="system-status">
          <h2>System</h2>
          <div id="system-status" hx-get="/api/v1/overview" hx-trigger="load"></div>
     </section>

     <section class="account-lanes">
          <h2>Accounts</h2>
          <table id="account-table" class="data-table">
               <thead>
                    <tr>
                         <th>Environment</th>
                         <th>Connection</th>
                         <th>Permission</th>
                         <th>Reconciliation</th>
                         <th>Open Orders</th>
                         <th>Positions</th>
                         <th>Freshness</th>
                    </tr>
               </thead>
               <tbody id="account-lanes-body">
                    <tr><td colspan="7">Loading...</td></tr>
               </tbody>
          </table>
     </section>
</section>
{% endblock %}
