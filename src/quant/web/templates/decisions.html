{% extends "base.html" %}

{% block title %}Decisions — Quant System{% endblock %}

{% block content %}
<section class="decisions-page">
       <h1>Automatic Decisions</h1>

       <div class="card">
            <h2>Decision History</h2>
            <table class="data-table" id="decisions-table">
                 <thead>
                      <tr><th>Time</th><th>Strategy</th><th>Signal</th><th>Outcome</th><th>Environment</th></tr>
                 </thead>
                 <tbody id="decisions-body"><tr><td colspan="5">No decisions</td></tr></tbody>
            </table>
       </div>

       <div class="card" id="decision-detail-card" style="display:none;">
            <button id="back-to-list" class="back-button">&larr; Back to decisions</button>
            <h2 id="decision-detail-title">Decision Detail</h2>
            <div id="decision-detail-content"></div>
       </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script nonce="{{ csp_nonce }}">
(function() {
      "use strict";
     function fmt(d) { if (!d) return "-"; return new Date(d).toLocaleString(); }

     function renderDecisions(data) {
          var body = document.getElementById("decisions-body");
          if (!body || !data.items || data.items.length === 0) return;
          var html = "";
          data.items.forEach(function(d) {
               html += '<tr data-id="' + d.id + '"><td>' + fmt(d.observedAt) + '</td><td>' + d.strategy + '</td><td>' + d.signal + '</td><td>' + window.quantRenderStatus(d.outcome) + '</td><td>' + (d.environment || '-') + '</td></tr>';
          });
          body.innerHTML = html;
          body.querySelectorAll("tr[data-id]").forEach(function(row) {
               row.style.cursor = "pointer";
               row.addEventListener("click", function() { loadDecision(this.getAttribute("data-id")); });
          });
     }

     function loadDecision(id) {
          fetch('/api/v1/decisions/' + id).then(function(r){return r.json();}).then(function(data) {
               var card = document.getElementById("decision-detail-card");
               var content = document.getElementById("decision-detail-content");
               if (card && content) {
                    card.style.display = "block";
                    document.getElementById("decisions-page")?.querySelector(".card:nth-child(2)")?.style.display === "block" && (document.querySelector(".decisions-page .card:first-child").style.display = "none");
                    var pre = document.createElement("pre");
                    pre.textContent = JSON.stringify(data.decision, null, 2);
                    content.replaceChildren(pre);
               }
          }).catch(function() {});
     }

     document.addEventListener("DOMContentLoaded", function() {
          fetch('/api/v1/decisions').then(function(r){return r.json();}).then(function(data){renderDecisions(data || {});}).catch(function(){});
          setInterval(function(){fetch('/api/v1/decisions').then(function(r){return r.json();}).then(function(data){renderDecisions(data || {});}).catch(function(){});}, 60000);
     });
})();
</script>
{% endblock %}
